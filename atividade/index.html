<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="container">

    <!-- IMAGEM -->
    <div class="form-image">
      <img src="assets/img/undraw_mobile-post_zwbe.svg" alt="Ilustração">
    </div>

    <!-- FORMULÁRIO -->
    <div class="form">
      <form>

        <div class="form-header">
          <h1>Cadastre-se</h1>

          <div class="login-button">
            <button type="button">Entrar</button>
          </div>
        </div>

        <div class="input-group">

          <div class="input-box">
            <label for="firstname">Primeiro nome</label>
            <input id="firstname" type="text" placeholder="Digite seu primeiro nome" required>
          </div>

          <div class="input-box">
            <label for="lastname">Sobrenome</label>
            <input id="lastname" type="text" placeholder="Digite seu sobrenome" required>
          </div>

          <div class="input-box">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Digite seu email" required>
          </div>

          <div class="input-box">
            <label for="number">Celular</label>
            <input id="number" type="tel" placeholder="(xx) xxxx-xxxx" required>
          </div>

          <div class="input-box">
            <label for="password">Senha</label>
            <input id="password" type="password" placeholder="Digite sua senha" required>
          </div>

          <div class="input-box">
            <label for="confirm">Confirmar senha</label>
            <input id="confirm" type="password" placeholder="Confirme sua senha" required>
          </div>

        </div>

        <div class="gender-inputs">
          <h6>Gênero</h6>

          <div class="gender-group">
            <label><input type="radio" name="gender"> Feminino</label>
            <label><input type="radio" name="gender"> Masculino</label>
            <label><input type="radio" name="gender"> Outros</label>
            <label><input type="radio" name="gender"> Prefiro não dizer</label>
          </div>
        </div>

        <div class="continue-button">
          <button type="submit">Continuar</button>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
